<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#047857">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.svg">
  <title>SIKOSIB - Koperasi</title>

  <script src="https://cdn.tailwindcss.com"></script>
  
  <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  
  <script src="https://unpkg.com/@babel/standalone@7.24.0/babel.min.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <script>
    tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] }, keyframes: { shake: { '0%, 100%': { transform: 'translateX(0)' }, '25%': { transform: 'translateX(-5px)' }, '75%': { transform: 'translateX(5px)' } } }, animation: { shake: 'shake 0.2s ease-in-out 0s 2' } } } };
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style> 
    body { font-family: 'Inter', sans-serif; overscroll-behavior-y: none; } 
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-slate-50 selection:bg-emerald-200">
  <div id="root">
    <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: sans-serif; color: #64748b;">
      <div style="width: 40px; height: 40px; border: 4px solid #cbd5e1; border-top: 4px solid #10b981; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px;"></div>
      <p style="font-weight: bold; letter-spacing: 1px;" id="loading-text">MEMUAT APLIKASI KOPERASI...</p>
    </div>
  </div>

  <script type="text/babel" data-presets="react">
    (async function() {
      try {
        const loadingText = document.getElementById('loading-text');
        
        const { useState, useEffect, useMemo, useRef } = React;
        const { createRoot } = ReactDOM;
        
        loadingText.innerText = "MENYIAPKAN TAMPILAN...";
        const Lucide = await import('https://esm.sh/lucide-react@0.292.0');
        const { 
          Upload, Users, DollarSign, TrendingUp, Search, FileText, 
          LogOut, Shield, ChevronRight, X, Download, AlertCircle, Edit, Save, Settings, Key, Building, Trash2, AlertTriangle, ExternalLink, Lock
        } = Lucide;
        
        loadingText.innerText = "MENGHUBUNGKAN KE DATABASE...";
        const { initializeApp } = await import('https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js');
        const { getAuth, signInAnonymously, onAuthStateChanged } = await import('https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js');
        const { getFirestore, collection, onSnapshot, doc, setDoc, getDoc, writeBatch, query, getDocs } = await import('https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js');

        const firebaseConfig = {
          apiKey: "AIzaSyDIA_8HL-335JZspg20sAhpaEbY5ovofxg",
          authDomain: "sikosib-28f29.firebaseapp.com",
          projectId: "sikosib-28f29",
          storageBucket: "sikosib-28f29.firebasestorage.app",
          messagingSenderId: "1096545835512",
          appId: "1:1096545835512:web:5fded121d1ce105d475e0d"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = "sikosib-28f29";

        function App() {
          const [fbUser, setFbUser] = useState(null);
          const [appRole, setAppRole] = useState(null); 
          const [members, setMembers] = useState([]);
          const [history, setHistory] = useState([]);
          const [loading, setLoading] = useState(true);
          const [authError, setAuthError] = useState(null);
          
          const [koperasiProfile, setKoperasiProfile] = useState({
            name: "Koperasi Syariah Indonesia",
            address: "Jl. Raya Utama No. 123, Jakarta",
            logo: "",
            adminPassword: "admin123"
          });

          useEffect(() => {
            const initAuth = async () => {
              try {
                await signInAnonymously(auth);
                setAuthError(null);
              } catch (err) {
                console.error("Auth error:", err);
                if (err.code === 'auth/configuration-not-found' || err.code === 'auth/operation-not-allowed') {
                  setAuthError("Provider 'Anonymous' belum diaktifkan di Firebase Console.");
                } else {
                  setAuthError(`Kesalahan Autentikasi: ${err.message}`);
                }
                setLoading(false);
              }
            };
            
            initAuth();

            const unsubscribe = onAuthStateChanged(auth, (user) => {
              setFbUser(user);
              if (user || authError) {
                setLoading(false);
              }
            });

            return () => unsubscribe();
          }, []);

          useEffect(() => {
            const profileRef = doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'config');
            const unsubProfile = onSnapshot(profileRef, (docSnap) => {
              if (docSnap.exists()) {
                setKoperasiProfile(prev => ({ ...prev, ...docSnap.data() }));
              }
            }, (error) => console.warn("Akses profil terbatas:", error));

            const membersRef = collection(db, 'artifacts', appId, 'public', 'data', 'koperasi_members');
            const unsubMembers = onSnapshot(membersRef, (snapshot) => {
              const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
              setMembers(data);
            }, (error) => console.warn("Akses anggota terbatas:", error));

            const historyRef = collection(db, 'artifacts', appId, 'public', 'data', 'koperasi_history');
            const unsubHistory = onSnapshot(historyRef, (snapshot) => {
              const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
              const sortedData = [...data].sort((a, b) => a.timestamp - b.timestamp);
              setHistory(sortedData);
            }, (error) => console.warn("Akses riwayat terbatas:", error));

            return () => {
              unsubProfile();
              unsubMembers();
              unsubHistory();
            };
          }, [fbUser]);

          const handleLogin = (username, password) => {
            if (username === 'admin' && password === koperasiProfile.adminPassword) {
              setAppRole('admin');
            } else if (username === 'ksib' && password === '12345') {
              setAppRole('anggota');
            } else {
              alert("Username atau password salah!");
            }
          };

          const handleLogout = () => setAppRole(null);

          if (authError) {
            return (
              <div className="min-h-screen bg-slate-100 flex items-center justify-center p-6">
                <div className="bg-white p-8 rounded-3xl shadow-2xl max-w-lg border-t-8 border-red-500 pb-8">
                  <div className="flex items-center gap-4 mb-6">
                    <div className="bg-red-100 p-3 rounded-2xl">
                      <AlertTriangle className="w-10 h-10 text-red-600" />
                    </div>
                    <div>
                      <h2 className="text-2xl font-bold text-slate-800">Aktifkan Autentikasi</h2>
                      <p className="text-red-500 font-medium text-sm">Error: auth/configuration-not-found</p>
                    </div>
                  </div>
                  
                  <div className="bg-slate-50 border border-slate-200 p-5 rounded-2xl mb-6 space-y-4">
                    <p className="text-slate-600 text-sm leading-relaxed">
                      Metode masuk <b>Anonymous (Anonim)</b> belum diaktifkan di proyek Firebase Anda. Silakan ikuti langkah berikut:
                    </p>
                    <ol className="text-sm text-slate-700 space-y-3">
                      <li className="flex gap-3">
                        <span className="flex-none bg-emerald-600 text-white w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold">1</span>
                        <span>Buka <a href={`https://console.firebase.google.com/project/${firebaseConfig.projectId}/authentication/providers`} target="_blank" rel="noreferrer" className="text-emerald-600 underline font-bold inline-flex items-center gap-1">Firebase Console <ExternalLink className="w-3 h-3"/></a></span>
                      </li>
                      <li className="flex gap-3">
                        <span className="flex-none bg-emerald-600 text-white w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold">2</span>
                        <span>Klik tab <b>Sign-in method</b>.</span>
                      </li>
                      <li className="flex gap-3">
                        <span className="flex-none bg-emerald-600 text-white w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold">3</span>
                        <span>Klik <b>Add new provider</b> dan pilih <b>Anonymous</b>.</span>
                      </li>
                      <li className="flex gap-3">
                        <span className="flex-none bg-emerald-600 text-white w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold">4</span>
                        <span>Klik tombol switch <b>Enable</b> lalu <b>Save</b>.</span>
                      </li>
                    </ol>
                  </div>

                  <button 
                    onClick={() => window.location.reload()} 
                    className="w-full bg-emerald-600 hover:bg-emerald-700 text-white py-4 rounded-2xl font-bold transition-all flex items-center justify-center gap-2"
                  >
                    Sudah Saya Aktifkan, Segarkan Halaman
                  </button>
                </div>
              </div>
            );
          }

          if (loading) {
            return (
              <div className="min-h-screen flex flex-col items-center justify-center bg-slate-50 text-slate-500">
                <div className="w-10 h-10 border-4 border-slate-200 border-t-emerald-500 rounded-full animate-spin mb-4"></div>
                <p className="font-bold">Menghubungkan Akun...</p>
              </div>
            );
          }

          if (!appRole) {
            return <LoginScreen onLogin={handleLogin} koperasiProfile={koperasiProfile} />;
          }

          return (
            <div className="min-h-screen bg-slate-50 font-sans text-slate-800">
              <nav className="bg-emerald-600 text-white shadow-md sticky top-0 z-50">
                <div className="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center gap-4">
                  <div className="flex items-center gap-3 min-w-0 flex-1">
                    {koperasiProfile.logo ? (
                      <img src={koperasiProfile.logo} alt="Logo" className="w-8 h-8 rounded-lg bg-white object-contain shadow-sm shrink-0" />
                    ) : (
                      <Shield className="w-6 h-6 text-emerald-200 shrink-0" />
                    )}
                    <h1 className="text-lg sm:text-xl font-bold tracking-tight truncate">{koperasiProfile.name}</h1>
                  </div>
                  <div className="flex items-center gap-2 sm:gap-4 shrink-0">
                    <span className="hidden sm:inline-block text-emerald-100 text-[10px] sm:text-xs font-bold bg-emerald-700/50 px-3 py-1.5 rounded-full uppercase tracking-wider">
                      {appRole}
                    </span>
                    <button onClick={handleLogout} className="flex items-center gap-1.5 bg-emerald-700/30 hover:bg-emerald-500 px-3 py-2 rounded-xl transition-all shadow-sm text-sm font-bold border border-emerald-500/30">
                      <LogOut className="w-4 h-4" />
                      <span className="hidden sm:inline">Keluar</span>
                    </button>
                  </div>
                </div>
              </nav>

              <main className="max-w-6xl mx-auto p-4 py-8">
                {appRole === 'admin' ? (
                  <AdminDashboard 
                    members={members} 
                    history={history} 
                    loading={loading}
                    db={db}
                    appId={appId}
                    profile={koperasiProfile}
                  />
                ) : (
                  <MemberDashboard 
                    members={members} 
                    loading={loading} 
                    profile={koperasiProfile}
                  />
                )}
              </main>
            </div>
          );
        }

        function LoginScreen({ onLogin, koperasiProfile }) {
          const [username, setUsername] = useState('');
          const [password, setPassword] = useState('');

          return (
            <div className="min-h-screen bg-emerald-50 flex items-center justify-center p-4">
              <div className="max-w-md w-full bg-white rounded-2xl shadow-xl overflow-hidden pt-0 animate-in fade-in slide-in-from-bottom-4 duration-500">
                <div className="bg-emerald-600 p-8 text-center">
                  {koperasiProfile.logo ? (
                    <img src={koperasiProfile.logo} alt="Logo" className="w-20 h-20 bg-white rounded-xl flex items-center justify-center mx-auto mb-4 object-contain p-2" />
                  ) : (
                    <div className="w-16 h-16 bg-white/20 rounded-full flex items-center justify-center mx-auto mb-3 backdrop-blur-sm text-white">
                      <Shield className="w-8 h-8" />
                    </div>
                  )}
                  <h2 className="text-2xl font-bold text-white">{koperasiProfile.name}</h2>
                  <p className="text-emerald-100 mt-1 text-sm">{koperasiProfile.address}</p>
                </div>
                
                <form onSubmit={(e) => { e.preventDefault(); onLogin(username, password); }} className="p-8 space-y-6">
                  <div className="space-y-4">
                    <div>
                      <label className="block text-sm font-semibold text-slate-700 mb-1">Username</label>
                      <input 
                        type="text" 
                        required 
                        className="w-full px-4 py-3 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-emerald-500 transition-all" 
                        value={username} 
                        onChange={(e) => setUsername(e.target.value)} 
                        placeholder="Masukkan username"
                      />
                    </div>
                    <div>
                      <label className="block text-sm font-semibold text-slate-700 mb-1">Password</label>
                      <input 
                        type="password" 
                        required 
                        className="w-full px-4 py-3 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-emerald-500 transition-all" 
                        value={password} 
                        onChange={(e) => setPassword(e.target.value)} 
                        placeholder="••••••••"
                      />
                    </div>
                  </div>
                  <button type="submit" className="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-4 rounded-xl shadow-lg shadow-emerald-100 transition-all active:scale-95">
                    Masuk Aplikasi
                  </button>
                  <div className="text-center pt-2">
                    <p className="text-xs text-slate-400">Hubungi admin jika lupa password</p>
                  </div>
                </form>
              </div>
            </div>
          );
        }

        function AdminDashboard({ members, history, loading, db, appId, profile }) {
          const [uploading, setUploading] = useState(false);
          const [activeTab, setActiveTab] = useState('overview'); 

          const totalAset = members.reduce((sum, m) => sum + (Number(m.total) || 0), 0);
          const totalSHU = members.reduce((sum, m) => sum + (Number(m.shu) || 0), 0);
          const totalPembiayaan = members.reduce((sum, m) => sum + (Number(m.sisaPembiayaan) || 0), 0);
          const formatRp = (num) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(num || 0);

          const handleFileUpload = async (e) => {
            if (!window.XLSX) return alert("Sistem belum siap. Tunggu beberapa saat.");
            const file = e.target.files[0];
            if (!file) return;

            setUploading(true);
            const reader = new FileReader();
            reader.onload = async (evt) => {
              try {
                const bstr = evt.target.result;
                const wb = window.XLSX.read(bstr, { type: 'binary' });
                const ws = wb.Sheets[wb.SheetNames[0]];
                const data = window.XLSX.utils.sheet_to_json(ws);

                if (data.length === 0) throw new Error("File kosong");

                const batch = writeBatch(db);
                let periodeUpload = data[0]['Periode'] || data[0]['Periode Bulan'] || data[0]['periode'] || "Bulan Ini";
                let tempAset = 0;
                let tempSHU = 0;

                data.forEach((row, i) => {
                  const nama = row['Nama Anggota'] || row['nama'] || `Anggota ${i+1}`;
                  const pokok = Number(row['Simpanan Pokok'] || 0);
                  const wajib = Number(row['Simpanan Wajib'] || 0);
                  const sukarela = Number(row['Simpanan Sukarela'] || 0);
                  const shu = Number(row['SHU'] || 0);
                  let total = Number(row['Total Saldo'] || (pokok + wajib + sukarela + shu));
                  
                  // FITUR NOMOR ANGGOTA
                  let noAnggotaRaw = row['No Anggota'] ?? row['Nomor Anggota'] ?? row['ID'] ?? row['no_anggota'];
                  const noAnggota = noAnggotaRaw != null ? String(noAnggotaRaw).trim() : '';

                  // FITUR PINTU PIN & PEMBIAYAAN SYARIAH
                  let pinRaw = row['PIN Akses'] ?? row['PIN'] ?? row['pin'];
                  const pin = pinRaw != null && String(pinRaw).trim() !== '' ? String(pinRaw).trim() : '';
                  const sisaPembiayaan = Number(row['Sisa Pembiayaan'] || row['Sisa Pinjaman'] || row['Pembiayaan'] || 0);
                  const angsuran = Number(row['Angsuran Bulan Ini'] || row['Angsuran'] || 0);
                  const jatuhTempo = row['Jatuh Tempo'] || '';

                  tempAset += total;
                  tempSHU += shu;

                  const safeName = nama.toLowerCase().trim().replace(/[^a-z0-9]/g, '_');
                  const docId = noAnggota ? `${noAnggota.toLowerCase().replace(/[^a-z0-9]/g, '')}_${safeName}` : safeName;
                  const ref = doc(db, 'artifacts', appId, 'public', 'data', 'koperasi_members', docId);
                  batch.set(ref, { 
                    noAnggota, nama, pokok, wajib, sukarela, shu, total, 
                    pin, sisaPembiayaan, angsuran, jatuhTempo,
                    periode: periodeUpload, 
                    updatedAt: Date.now() 
                  });
                });
                
                await batch.commit();

                const historyId = periodeUpload.toLowerCase().replace(/[^a-z0-9]/g, '_');
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'koperasi_history', historyId), {
                  periode: periodeUpload, 
                  totalAset: tempAset, 
                  totalSHU: tempSHU, 
                  timestamp: Date.now()
                });

                alert(`Data periode ${periodeUpload} berhasil diunggah!`);
                setActiveTab('members');
              } catch (err) {
                console.error(err);
                alert("Gagal memproses file Excel.");
              }
              setUploading(false);
            };
            reader.readAsBinaryString(file);
          };

          return (
            <div className="space-y-6">
              <div className="flex flex-col md:flex-row md:items-end justify-between gap-4 bg-white p-4 sm:p-6 rounded-2xl shadow-sm border border-slate-100">
                <div>
                  <h2 className="text-xl sm:text-2xl font-bold text-slate-800">Dashboard Admin</h2>
                  <p className="text-slate-500 uppercase text-[10px] sm:text-xs font-bold tracking-widest mt-1">{profile.name}</p>
                </div>
                <div className="flex gap-2 w-full md:w-auto">
                  <input type="file" id="file-upload" className="hidden" accept=".xlsx,.xls,.csv" onChange={handleFileUpload} />
                  <label htmlFor="file-upload" className="flex items-center justify-center gap-2 px-5 py-3 rounded-xl font-bold bg-emerald-600 text-white cursor-pointer hover:bg-emerald-700 transition-all w-full md:w-auto shadow-md">
                    {uploading ? <div className="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div> : <Upload className="w-5 h-5" />}
                    {uploading ? 'Memproses...' : 'Upload Data Bulanan'}
                  </label>
                </div>
              </div>

              <div className="flex overflow-x-auto no-scrollbar space-x-1 sm:space-x-2 border-b border-slate-200">
                <button onClick={() => setActiveTab('overview')} className={`flex items-center gap-2 px-4 py-3 sm:py-2 whitespace-nowrap font-medium border-b-2 transition-colors ${activeTab === 'overview' ? 'border-emerald-600 text-emerald-600' : 'border-transparent text-slate-500 hover:text-slate-700'}`}>
                  <TrendingUp className="w-4 h-4" /> Ringkasan
                </button>
                <button onClick={() => setActiveTab('members')} className={`flex items-center gap-2 px-4 py-3 sm:py-2 whitespace-nowrap font-medium border-b-2 transition-colors ${activeTab === 'members' ? 'border-emerald-600 text-emerald-600' : 'border-transparent text-slate-500 hover:text-slate-700'}`}>
                  <Users className="w-4 h-4" /> Data Anggota
                </button>
                <button onClick={() => setActiveTab('settings')} className={`flex items-center gap-2 px-4 py-3 sm:py-2 whitespace-nowrap font-medium border-b-2 transition-colors ${activeTab === 'settings' ? 'border-emerald-600 text-emerald-600' : 'border-transparent text-slate-500 hover:text-slate-700'}`}>
                  <Settings className="w-4 h-4" /> Pengaturan
                </button>
              </div>

              {activeTab === 'overview' && (
                <div className="grid grid-cols-1 md:grid-cols-3 gap-6 animate-in fade-in">
                  <StatCard title="Total Aset Simpanan" value={formatRp(totalAset)} icon={<DollarSign className="w-6 h-6 text-emerald-600" />} bg="bg-emerald-50" />
                  <StatCard title="Total SHU Terdistribusi" value={formatRp(totalSHU)} icon={<TrendingUp className="w-6 h-6 text-amber-600" />} bg="bg-amber-50" />
                  <StatCard title="Pembiayaan Berjalan" value={formatRp(totalPembiayaan)} icon={<FileText className="w-6 h-6 text-indigo-600" />} bg="bg-indigo-50" />
                  
                  <div className="md:col-span-3 bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                    <h3 className="font-bold flex items-center gap-2 mb-6"><TrendingUp className="w-5 h-5 text-emerald-600" /> Grafik Pertumbuhan</h3>
                    <SimpleBarChart data={history} />
                  </div>
                </div>
              )}

              {activeTab === 'members' && <MemberList members={members} loading={loading} isAdmin={true} db={db} appId={appId} profile={profile} />}
              {activeTab === 'settings' && <SettingsPanel profile={profile} db={db} appId={appId} />}
            </div>
          );
        }

        function SettingsPanel({ profile, db, appId }) {
          const [formData, setFormData] = useState({ ...profile });
          const [saving, setSaving] = useState(false);
          const [isResetting, setIsResetting] = useState(false);
          const [resetConfirm, setResetConfirm] = useState('');

          const handleSave = async (e) => {
            e.preventDefault();
            setSaving(true);
            try {
              await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'config'), formData);
              alert("Pengaturan koperasi telah diperbarui!");
            } catch (err) {
              alert("Gagal menyimpan pengaturan.");
            }
            setSaving(false);
          };

          const handleResetData = async () => {
            if (resetConfirm !== 'HAPUS') {
              alert("Silakan ketik HAPUS untuk mengonfirmasi.");
              return;
            }

            setIsResetting(true);
            try {
              const membersSnap = await getDocs(collection(db, 'artifacts', appId, 'public', 'data', 'koperasi_members'));
              const historySnap = await getDocs(collection(db, 'artifacts', appId, 'public', 'data', 'koperasi_history'));
              
              const batch = writeBatch(db);
              membersSnap.forEach((d) => batch.delete(d.ref));
              historySnap.forEach((d) => batch.delete(d.ref));
              
              await batch.commit();
              alert("Seluruh data anggota dan riwayat telah dikosongkan!");
              setResetConfirm('');
            } catch (err) {
              console.error(err);
              alert("Terjadi kesalahan saat menghapus data.");
            }
            setIsResetting(false);
          };

          return (
            <div className="max-w-2xl mx-auto space-y-8 animate-in fade-in">
              <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                <h3 className="text-xl font-bold text-slate-800 mb-6 flex items-center gap-2">
                  <Settings className="w-6 h-6 text-emerald-600" /> Identitas Aplikasi
                </h3>

                <p className="text-sm text-red-600 mb-6">Fitur ini akan menghapus **SELURUH DATA ANGGOTA** dan **RIWAYAT GRAFIK**. Gunakan hanya jika Anda ingin mengosongkan database untuk upload data baru dari nol.</p>

        function MemberList({ members, loading, isAdmin, db, appId, profile }) {
          const [searchTerm, setSearchTerm] = useState('');
          const [selectedMember, setSelectedMember] = useState(null);

          const filteredMembers = useMemo(() => {
            const searchLower = searchTerm.toLowerCase();
            return members.filter(m => (m.nama && m.nama.toLowerCase().includes(searchLower)) || (m.noAnggota && m.noAnggota.toLowerCase().includes(searchLower)));
          }, [members, searchTerm]);

          return (
            <div className="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
              <div className="p-4 border-b flex flex-col sm:flex-row justify-between items-center gap-4 bg-slate-50/50">
                <h3 className="font-bold text-slate-700">Daftar Anggota ({filteredMembers.length})</h3>
                <div className="relative w-full sm:w-72">
                  <input type="text" placeholder="Cari nama anggota..." className="w-full pl-10 pr-4 py-2 rounded-lg border focus:ring-2 focus:ring-emerald-500 outline-none shadow-sm" value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} />

                </div>
              </div>

              {loading ? (

                          {member.nama}
                        </p>
                        <p className="text-xs text-emerald-600 font-black tracking-wide mt-1 truncate">{new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(member.total)}</p>
                      </div>
                      <div className="flex items-center gap-2">
                        {member.pin && !isAdmin && <div className="bg-amber-100 text-amber-600 p-1.5 rounded-full shadow-sm" title="Dilindungi PIN"><Lock className="w-3 h-3" /></div>}

                  db={db} 
                  appId={appId} 
                  profile={profile}
                />
              )}
            </div>
          );

        // --- NEW PIN GATE COMPONENT ---
        function PinGate({ memberPin, onUnlock, onClose, profile }) {
          const [inputPin, setInputPin] = useState('');
          const [error, setError] = useState(false);

          const handleSubmit = (e) => {
            e.preventDefault();
            if (inputPin === memberPin) {
              onUnlock();
            } else {
              setError(true);
              setInputPin('');
            }
          };

          return (

                      maxLength="8"

                      value={inputPin}
                      onChange={(e) => { setInputPin(e.target.value); setError(false); }}
                      placeholder="••••••"
                    />
                    {error && <p className="text-center text-red-500 text-xs font-bold mt-3 animate-in slide-in-from-top-1">PIN Tidak Sesuai!</p>}
                  </div>
                  
                  <button type="submit" disabled={inputPin.length < 4} className="w-full bg-emerald-600 hover:bg-emerald-700 disabled:bg-slate-200 disabled:text-slate-400 text-white font-black text-base py-4 rounded-xl transition-all shadow-lg active:scale-95 flex items-center justify-center gap-2">

                  </button>
                </form>
              </div>
            </div>
          );
        }

        // --- WRAPPER UNTUK MENGGABUNGKAN GATE & MODAL ---
        function MemberDetailWithGate({ member, onClose, isAdmin, db, appId, profile }) {
          const [isUnlocked, setIsUnlocked] = useState(false);
          
          const rawPin = member.pin ? String(member.pin).trim() : '';
          const hasPin = rawPin !== '' && rawPin.toLowerCase() !== 'undefined' && rawPin.toLowerCase() !== 'null';

          // Jika Admin login ATAU member tidak punya PIN disetel, langsung buka jalurnya.
          const bypassGate = isAdmin || !hasPin;

          if (!bypassGate && !isUnlocked) {
            return <PinGate memberPin={member.pin.toString()} onUnlock={() => setIsUnlocked(true)} onClose={onClose} profile={profile} />;
          }

          return <MemberDetailModal member={member} onClose={onClose} isAdmin={isAdmin} db={db} appId={appId} profile={profile} />;
        }

        function MemberDetailModal({ member, onClose, isAdmin, db, appId, profile }) {
          const [isEditing, setIsEditing] = useState(false);
          const [editData, setEditData] = useState({ 
            pokok: member.pokok || 0, wajib: member.wajib || 0, sukarela: member.sukarela || 0, shu: member.shu || 0,
            sisaPembiayaan: member.sisaPembiayaan || 0, angsuran: member.angsuran || 0, jatuhTempo: member.jatuhTempo || ''
          });
          const detailRef = useRef(null);

          const formatRp = (num) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(num || 0);

          const getTodayDate = () => {
            return new Intl.DateTimeFormat('id-ID', { 
              day: 'numeric', 
              month: 'long', 
              year: 'numeric',
              hour: '2-digit',
              minute: '2-digit'
            }).format(new Date());
          };

          const handleDownloadPDF = () => {
            if (!window.html2pdf) return alert("Sistem cetak sedang bersiap.");
            const element = detailRef.current;
            
            const opt = {
              margin: [10, 10, 10, 10],
              filename: `Rincian_Simpanan_${member.nama}.pdf`,
              image: { type: 'jpeg', quality: 1.0 },
              html2canvas: { scale: 2, useCORS: true },
              jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };
            
            const btns = element.querySelectorAll('.no-print');
            btns.forEach(b => b.style.display = 'none');
            
            window.html2pdf().set(opt).from(element).save().then(() => {
              btns.forEach(b => b.style.display = 'flex');
            });
          };

          const handleSave = async () => {
            const total = Number(editData.pokok) + Number(editData.wajib) + Number(editData.sukarela) + Number(editData.shu);
            try {
              await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'koperasi_members', member.id), { ...member, ...editData, total, updatedAt: Date.now() });
              alert("Data berhasil diperbarui.");
              setIsEditing(false);
              onClose();
            } catch (err) { alert("Terjadi kesalahan."); }

          return (

                      <div className="flex-1">
                        <h3 className="font-black text-base sm:text-xl leading-tight">{profile.name}</h3>
                        <p className="text-[9px] sm:text-xs text-emerald-100 mt-0.5 opacity-90 line-clamp-1">{profile.address}</p>

                          <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 line-clamp-1">Anggota Terdaftar</p>

                        {member.noAnggota && (

                            <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">No. Anggota</p>

                           <h4 className="font-black text-slate-800 uppercase tracking-wide text-xs sm:text-sm">Akumulasi Simpanan</h4>
                        </div>
                        
                        <div className="bg-white border-2 border-emerald-50 rounded-2xl p-2 sm:p-4 block">
                          {[
                            { label: 'Simpanan Pokok', key: 'pokok' },
                            { label: 'Simpanan Wajib', key: 'wajib' },
                            { label: 'Simpanan Sukarela', key: 'sukarela' },

                              {isEditing ? (
                                <input type="number" className="w-full sm:w-32 text-left sm:text-right border-2 border-emerald-100 rounded-lg p-1.5 focus:border-emerald-500 outline-none" value={editData[row.key]} onChange={e => setEditData({...editData, [row.key]: e.target.value})} />
                              ) : (
                                <span className="font-bold text-base text-slate-800 break-words">{formatRp(member[row.key])}</span>
                              )}
                            </div>
                          ))}
                        </div>
                        
                        <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center text-emerald-900 bg-emerald-100/50 p-4 sm:p-5 rounded-2xl border-2 border-emerald-500/20 gap-1.5 sm:gap-2 shadow-sm">

                        </div>
                      </div>

                             <div className="flex items-center gap-2">
                               <AlertCircle className="w-5 h-5 text-amber-600" /> 
                               <h4 className="font-black text-amber-800 uppercase tracking-wide text-xs sm:text-sm">Riwayat Pembiayaan</h4>
                             </div>
                             <span className="bg-amber-100 text-amber-700 text-[9px] font-bold px-2 py-1 rounded-md uppercase tracking-wider">Syariah</span>
                          </div>

                          <div className="bg-gradient-to-br from-amber-50 to-orange-50/30 p-2 sm:p-4 rounded-2xl border border-amber-200/60 shadow-sm block">
                            {[
                                { label: 'Sisa Pembiayaan', key: 'sisaPembiayaan', isNumber: true },
                                { label: 'Angsuran Bulan Ini', key: 'angsuran', isNumber: true },
                                { label: 'Jatuh Tempo', key: 'jatuhTempo', isNumber: false }
                            ].map((row, idx) => (
                               <div key={row.key} className={`flex flex-col sm:flex-row justify-between sm:items-center py-2.5 sm:py-3 gap-1 sm:gap-4 ${idx !== 2 ? 'border-b border-amber-200/50' : ''}`}>
                                 <span className="text-amber-800/80 font-medium text-xs sm:text-sm">{row.label}</span>

            <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex items-center gap-5 transition-transform hover:scale-[1.02]">

                <p className="text-2xl font-black text-slate-800">{value}</p>
              </div>
            </div>
          );

        function SimpleBarChart({ data }) {
          const chartData = data.slice(-8);
          const maxVal = Math.max(...chartData.map(d => d.totalAset), 1000);
          const formatCompact = (num) => new Intl.NumberFormat('id-ID', { notation: 'compact', maximumFractionDigits: 1 }).format(num);

          return (
            <div className="h-64 flex items-end gap-3 sm:gap-6 pt-10 px-2 relative">
              {chartData.map((item, idx) => (
                <div key={idx} className="flex-1 flex flex-col items-center gap-3 group relative h-full justify-end">
                  <div className="w-full bg-slate-50 rounded-t-xl h-full flex items-end justify-center border border-slate-100/50">
                     <div className="w-full sm:w-10 bg-emerald-500 rounded-t-md shadow-lg transition-all duration-700 hover:bg-emerald-400" style={{ height: `${(item.totalAset/maxVal)*100}%` }}></div>
                  </div>
                  <div className="flex flex-col items-center">
                    <span className="text-[10px] font-black text-slate-800">{formatCompact(item.totalAset)}</span>
                    <span className="text-[9px] text-slate-400 font-bold uppercase tracking-tighter truncate w-16 text-center">{item.periode}</span>
                  </div>
                </div>
              ))}
              {chartData.length === 0 && (
                <div className="w-full h-full flex flex-col items-center justify-center text-slate-300 italic text-sm border-2 border-dashed border-slate-100 rounded-3xl">
                  <TrendingUp className="w-12 h-12 mb-3 opacity-20" />
                  Belum ada riwayat periode.
                </div>
              )}
            </div>
          );
        }

        loadingText.innerText = "MEMBUKA APLIKASI...";
        const root = createRoot(document.getElementById('root'));
        root.render(<App />);

      } catch(err) {
        console.error("Gagal menjalan aplikasi:", err);
        document.getElementById('root').innerHTML = `
          <div style="padding: 40px; font-family: sans-serif; text-align: center; max-width: 600px; margin: 0 auto;">
            <h2 style="color: #ef4444; margin-bottom: 20px;">Gagal Memuat Aplikasi</h2>
            <div style="background: #fef2f2; border: 1px solid #fca5a5; padding: 20px; border-radius: 12px; text-align: left; color: #7f1d1d;">
              <p>Terjadi kesalahan teknis saat browser Anda memproses kode aplikasi. Error detail:</p>
              <pre style="margin-top:10px; background: #fee2e2; padding: 10px; border-radius: 8px; font-size: 12px; overflow-x: auto;">${err.message}</pre>
            </div>
          </div>
        `;
      }
    })();

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js');
      });
    }
  </script>
</body>
</html>
